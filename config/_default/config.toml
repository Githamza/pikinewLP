######################## default configuration ####################
baseURL = "https://www.piki-app.fr/"
title = "Piki — Commande en ligne restaurant sans commission | Click & Collect, QR code, livraison"
theme = "saasis-hugo"
defaultContentLanguage = "fr"
languageCode = "fr-fr"
# Canonical URL handling: strip trailing slashes/index pages per Google best practice
canonifyURLs = false
# post pagination
pagination.pagerSize = 6
# post excerpt
summaryLength = "10"
# Disable English — content not ready, only French is active
disableLanguages = ["en"]
enableRobotsTXT = true

# Exclude taxonomy listing pages (tags, categories) from the build entirely
# They generate thin pages that dilute crawl budget
disableKinds = ["taxonomy", "term"]

# Mount only French content — prevents Hugo from processing content/english/
# as a regular section and generating duplicate /french/ and /english/ paths
[[module.mounts]]
  source = "content/french"
  target = "content"
  lang = "fr"
[[module.mounts]]
  source = "static"
  target = "static"
[[module.mounts]]
  source = "assets"
  target = "assets"

########################### Services #############################
[services]
[services.googleAnalytics]
# Leave empty to avoid injecting a broken/placeholder GA tag (hurts CWV/PageSpeed)
ID = ''

[services.disqus]
shortname = ''

############################# Imaging ##############################
[imaging]
quality = 90

############################# Outputs ##############################
[outputs]
home = ["HTML", "RSS", "JSON", "WebAppManifest"]

[markup]
[markup.goldmark.renderer]
unsafe = true

[mediaTypes]
[mediaTypes."application/manifest+json"]
suffixes = ["webmanifest"]

[mediaTypes."text/netlify"]
delimiter = ""
suffixes = [""]

[outputFormats]
[outputFormats.WebAppManifest]
mediaType = "application/manifest+json"
rel = "manifest"

######################## default configuration ####################
baseURL = "https://www.piki-app.fr/"
title = "Piki — Commande en ligne restaurant sans commission | Click & Collect, QR code, livraison"
theme = "saasis-hugo"
defaultContentLanguage = "fr"
languageCode = "fr-fr"
# Canonical URL handling: strip trailing slashes/index pages per Google best practice
canonifyURLs = false
# post pagination
pagination.pagerSize = 6
# post excerpt
summaryLength = "10"
# disable language
disableLanguages = []
enableRobotsTXT = true

########################### Services #############################
[services]
[services.googleAnalytics]
# Leave empty to avoid injecting a broken/placeholder GA tag (hurts CWV/PageSpeed)
ID = ''

[services.disqus]
shortname = ''

############################# Imaging ##############################
[imaging]
quality = 90

############################# Outputs ##############################
[outputs]
home = ["HTML", "RSS", "JSON", "WebAppManifest"]

[markup]
[markup.goldmark.renderer]
unsafe = true

[mediaTypes]
[mediaTypes."application/manifest+json"]
suffixes = ["webmanifest"]

[mediaTypes."text/netlify"]
delimiter = ""
suffixes = [""]

[outputFormats]
[outputFormats.WebAppManifest]
mediaType = "application/manifest+json"
rel = "manifest"

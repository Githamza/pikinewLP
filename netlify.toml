[build]
  publish = "public"
  command = "hugo --gc --minify --templateMetrics --templateMetricsHints --forceSyncStatic -b $HUGO_BASEURL"
  
[build.environment]
  HUGO_VERSION = "0.147.6"
  HUGO_BASEURL = "https://piki-app.fr/"

[[headers]]
  for = "/*" # This defines which paths this specific [[headers]] block will cover.

[headers.values]
  X-Frame-Options = "DENY"
  X-XSS-Protection = "1; mode=block"
  Referrer-Policy = "same-origin"
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Long cache for fingerprinted JS/CSS bundles (immutable, 1 year)
[[headers]]
  for = "/js/bundle.min.*.js"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/style.min.*.css"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

# Long cache for images (1 year)
[[headers]]
  for = "/images/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

# Long cache for Hugo-processed images with fingerprints
[[headers]]
  for = "/images/banner/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

# Long cache for webfonts
[[headers]]
  for = "*.woff2"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

# Long cache for all webp/svg assets
[[headers]]
  for = "*.webp"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
[build]
  publish = "public"
  command = "hugo --gc --minify --templateMetrics --templateMetricsHints --forceSyncStatic -b $HUGO_BASEURL"
  
[build.environment]
  HUGO_VERSION = "0.147.6"
  HUGO_BASEURL = "https://www.piki-app.fr/"

# Note: Security and cache headers are handled via static/.htaccess for OVH (Apache)
